version: "3.9"
services:
  api:
    build: ..
    command: ["npm", "run", "start"]
    environment:
      - PORT=5000
      - EXECUTOR=docker
      - USE_DOCKER=1
      - EXECUTOR_IMAGE=coding-platform-executor:local
    ports:
      - "5000:5000"
    depends_on:
      - executor
  executor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.executor
    image: coding-platform-executor:local
